<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Conoce nuestra lista de precios ¡Descargala!">
    <link rel="shortcut icon" href="https://i.postimg.cc/pr5LzwP5/logo.png" type="image/x-icon">
    <link rel="canonical" href="https://vidaactiva.click/descargar-lista.html">

 <!-- Open Graph Meta Tags (para redes sociales) -->
    <meta property='og:type' content='website'>
    <meta property='og:title' content='Vida Activa | Lista de Precios'>
    <meta property='og:image' content='https://i.postimg.cc/MTZmLsw7/portada.jpg'>
    <meta property='og:description' content='Lista de Precios'>
    <meta property='og:url' content='https://vidaactiva.click/descargar-lista.html'> <!-- URL final de tu sitio web -->

    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#189364',
                        secondary: '#a3c759',
                        dark: '#1d1d1b',
                        light: '#f4f7f6',
                    }
                }
            }
        }
    </script>
    <style>
        /* CSS específico para impresión */
        @media print {
            .no-print { 
                display: none !important; 
            }
            body { 
                background: white !important; 
                padding: 0 !important;
            }
            .max-w-4xl {
                max-width: 100% !important;
                width: 100% !important;
                box-shadow: none !important;
                padding: 0 !important;
            }
            @page { 
                margin: 1.5cm; 
            }
        }
        
        /* Estilo de la Marca de Agua */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 8rem;
            font-weight: 900;
            color: rgba(24, 147, 100, 0.05);
            white-space: nowrap;
            pointer-events: none;
            z-index: -1;
            text-transform: uppercase;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        
        /* Loading spinner */
        .loader {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #189364;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Fade in animation */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-10">

    <div class="watermark">Vida Activa Market</div>

    <div id="loading-state" class="max-w-4xl mx-auto bg-white p-8 shadow-xl rounded-xl relative overflow-hidden text-center">
        <div class="flex flex-col items-center justify-center py-16">
            <div class="loader mb-4"></div>
            <p class="text-gray-500 font-medium">Cargando lista de productos...</p>
        </div>
    </div>

    <div id="content-state" class="max-w-4xl mx-auto bg-white p-8 shadow-xl rounded-xl relative overflow-hidden hidden fade-in">
        
        <div class="flex justify-between items-center border-b-4 pb-6 mb-8" style="border-bottom-color: #189364;">
            <div>
                <img src="img/logo.png" alt="Logo" class="h-16 mb-2">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">VENTAS: ZULEIMA TUA</p>
            </div>
            <div class="text-right">
                <h1 class="text-2xl font-black text-primary italic uppercase">Lista de Precios</h1>
                <p class="text-sm text-gray-500 font-bold" id="current-date"></p>
                <p class="text-sm text-gray-500 font-bold">Telf: 0412-0698850</p>
                <p class="text-[10px] text-gray-400 font-medium">Cabimas, Zulia - Venezuela</p>
            </div>
        </div>

        <div class="no-print fixed bottom-10 right-10 flex gap-4 z-50">
            <button onclick="window.print()" class="bg-primary text-white px-8 py-4 rounded-full font-black shadow-2xl hover:scale-105 transition-transform flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polygon points="7 10 12 15 17 10 12 15 7 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Descargar PDF
            </button>
            <a href="index.html" class="bg-dark text-white px-8 py-4 rounded-full font-black shadow-2xl hover:scale-105 transition-transform flex items-center gap-2" style="background-color: #1d1d1b;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Volver a la Tienda
            </a>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-primary text-white text-[11px] uppercase tracking-tighter">
                        <th class="p-3 border border-green-700">Producto</th>
                        <th class="p-3 border border-green-700">Laboratorio / Detalle</th>
                        <th class="p-3 border border-green-700 text-center w-24">Precio</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    <!-- Productos cargados dinámicamente -->
                </tbody>
            </table>
        </div>

        <div class="mt-12 pt-8 border-t border-gray-100 flex justify-between items-center">
            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em]">
                Vida Activa Market | CEO Zuleima Tua
            </div>
            <div class="text-[10px] text-gray-400">
                Precios sujetos a cambios sin previo aviso.
            </div>
        </div>
    </div>

    <script>
        // Configuración (mismo margen que la tienda principal)
        const CONFIG = {
            MARGIN: 1.40,
            BEFORE_MARGIN: 1.50,
            DEFAULT_IMG: 'img/envase.jpg',
            IMG_PATH: 'img/productos/'
        };

        let productsData = [];

        // Formatear fecha actual
        function formatDate() {
            const date = new Date();
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        // Aplicar margen al precio
        function applyMargin(price) {
            return (parseFloat(price) * CONFIG.MARGIN).toFixed(2);
        }

        // Renderizar tabla de productos
        function renderTable(products) {
            const tbody = document.getElementById('products-table-body');
            if (!tbody) return;
            
            // Ordenar productos: por categoría y luego por nombre
            const sortedProducts = [...products].sort((a, b) => {
                if (a.category === b.category) {
                    return a.product_name.localeCompare(b.product_name);
                }
                return a.category.localeCompare(b.category);
            });
            
            let currentCategory = '';
            let html = '';
            
            sortedProducts.forEach(product => {
                const priceWithMargin = applyMargin(product.price);
                const presentation = product.presentation_lab && product.presentation_lab.trim() !== '' 
                    ? product.presentation_lab 
                    : 'Natural';
                
                // Agregar separador de categoría
                if (currentCategory !== product.category) {
                    currentCategory = product.category;
                    html += `
                        <tr class="bg-gray-100">
                            <td colspan="3" class="p-3 font-black text-gray-700 uppercase border border-gray-200 tracking-widest text-[10px]">
                                Categoría: ${escapeHtml(currentCategory)}
                            </td>
                        </tr>
                    `;
                }
                
                // Agregar fila de producto
                html += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-3 border border-gray-200 font-semibold text-gray-800 italic">
                            ${escapeHtml(product.product_name)}
                        </td>
                        <td class="p-3 border border-gray-200 text-gray-500 text-xs">
                            ${escapeHtml(presentation)}
                        </td>
                        <td class="p-3 border border-gray-200 text-center font-black" style="color: #189364;">
                            $${priceWithMargin}
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        // Función para escapar HTML y evitar XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // Cargar productos desde products.json
        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                const text = await response.text();
                // Sanitizar JSON (misma lógica que en index.html)
                const sanitized = `[${text.replace(/\},(\s*)\{/g, '},{')}]`;
                const rawProducts = JSON.parse(sanitized);
                
                // Filtrar productos con precio mayor a 0 (opcional, mostrar todos)
                productsData = rawProducts.filter(p => parseFloat(p.price) > 0);
                
                // Mostrar la fecha actual
                document.getElementById('current-date').textContent = `Fecha: ${formatDate()}`;
                
                // Renderizar la tabla
                renderTable(productsData);
                
                // Ocultar loading, mostrar contenido
                document.getElementById('loading-state').classList.add('hidden');
                const contentState = document.getElementById('content-state');
                contentState.classList.remove('hidden');
                contentState.classList.add('fade-in');
                
                // Pequeño log en consola
                console.log(`✅ Lista de precios cargada: ${productsData.length} productos`);
                
            } catch (error) {
                console.error('Error al cargar products.json:', error);
                document.getElementById('loading-state').innerHTML = `
                    <div class="text-center py-16">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-4"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <p class="text-red-500 font-medium">Error al cargar los productos</p>
                        <p class="text-gray-400 text-sm mt-2">Verifica que el archivo products.json esté disponible</p>
                        <a href="index.html" class="inline-block mt-6 bg-primary text-white px-6 py-3 rounded-full font-bold">Volver a la Tienda</a>
                    </div>
                `;
            }
        }
        
        // Iniciar carga cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>

     <!-- Click -->
    <script src="noclick.js"></script>
</body>
</html>
